apiVersion: apps/v1
kind: Deployment
metadata:
  name: rps-api
  namespace: rps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rps-api
  template:
    metadata:
      labels:
        app: rps-api
    spec:
      containers:
        - name: rps-api
          image: rps-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DATABASE_URL
            - name: DB_STARTUP_RETRIES
              value: "20"
            - name: DB_STARTUP_DELAY
              value: "3"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rps-api
  namespace: rps
spec:
  selector:
    app: rps-api
  ports:
    - port: 8000
      targetPort: 8000
