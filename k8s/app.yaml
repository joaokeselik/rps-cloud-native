apiVersion: apps/v1
kind: Deployment
metadata:
  name: rps-api
  namespace: rps
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/match-tag: "true"
    keel.sh/pollSchedule: "@every 2m"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rps-api
  template:
    metadata:
      labels:
        app: rps-api
    spec:
      initContainers:
        - name: wait-for-mysql
          image: mysql:8.4
          command:
            - sh
            - -c
            - until mysqladmin ping -h mysql -uroot -p"$MYSQL_ROOT_PASSWORD"; do echo waiting for mysql; sleep 2; done
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD
      containers:
        - name: rps-api
          image: keseljoa/rps-cloud-native:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: DATABASE_URL
            - name: DB_STARTUP_RETRIES
              value: "60"
            - name: DB_STARTUP_DELAY
              value: "3"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rps-api
  namespace: rps
spec:
  selector:
    app: rps-api
  ports:
    - port: 8000
      targetPort: 8000
